services:
  german-api:
    build: .
    container_name: german-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - german-data:/app/data
      - german-pdfs:/app/pdfs
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=sqlite:////app/data/german.db
      - API_SECRET_KEY=${API_SECRET_KEY}
      - PONS_API_KEY=${PONS_API_KEY}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - n8n-fcnf-n8n-1

volumes:
  german-data:
  german-pdfs:

networks:
  n8n-fcnf-n8n-1:
    external: true
